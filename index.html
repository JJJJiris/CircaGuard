<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CircaGuard Web PPT</title>
    <link rel="stylesheet" href="./styles.css?v=20260429-videojump-1" />
  </head>
  <body>
    <div class="deck" id="deck">
      <header class="topbar">
        <div class="brand" id="brand">CircaGuard</div>
        <div class="toolbar">
          <button id="voiceBtn" type="button" title="语音讲解开关">语音：关</button>
          <button id="voiceSettingsBtn" type="button" title="语音设置">语音设置</button>
          <button id="langBtn" type="button" title="切换中英文">EN</button>
          <button id="videoBtn" type="button">播放影片</button>
          <button id="posterBtn" type="button">查看海报</button>
          <button id="fullscreenBtn" type="button">全屏</button>
          <button id="printBtn" type="button">导出PDF</button>
          <div class="counter" id="counter">1 / 12</div>
        </div>
      </header>

      <main class="slides" id="slides"></main>

      <footer class="controls">
        <button id="prevBtn" type="button" aria-label="上一页">← 上一页</button>
        <div class="progress-wrap"><div id="progress"></div></div>
        <div class="page-jump-wrap">
          <button id="pageJumpBtn" type="button" aria-label="选择页码">页码</button>
          <div class="page-jump-panel" id="pageJumpPanel" hidden></div>
        </div>
        <button id="nextBtn" type="button" aria-label="下一页">下一页 →</button>
      </footer>
    </div>

    <div class="video-modal" id="videoModal" hidden>
      <div class="video-backdrop" id="videoBackdrop"></div>
      <div class="video-panel" role="dialog" aria-modal="true" aria-labelledby="videoTitle">
        <div class="video-head">
          <h3 id="videoTitle">项目影片</h3>
          <button id="closeVideoBtn" type="button" aria-label="关闭影片">关闭</button>
        </div>
        <iframe
          id="projectVideo"
          title="CircaGuard Demo Video"
          src=""
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
        ></iframe>
      </div>
    </div>

    <div class="voice-modal" id="voiceModal" hidden>
      <div class="voice-backdrop" id="voiceBackdrop"></div>
      <div class="voice-panel" role="dialog" aria-modal="true" aria-labelledby="voiceTitle">
        <div class="voice-head">
          <h3 id="voiceTitle">语音设置</h3>
          <button id="closeVoiceBtn" type="button" aria-label="关闭语音设置">关闭</button>
        </div>
        <div class="voice-body">
          <label for="zhVoiceSelect">中文声音</label>
          <select id="zhVoiceSelect"></select>

          <label for="enVoiceSelect">英文声音</label>
          <select id="enVoiceSelect"></select>

          <div class="voice-actions">
            <button id="previewVoiceBtn" type="button">试听当前页</button>
            <button id="resetVoiceBtn" type="button">恢复自动推荐</button>
          </div>
          <p class="voice-tip" id="voiceTip">
            建议优先选择包含 Siri / Neural / Enhanced 的语音，听感会更自然。
          </p>
        </div>
      </div>
    </div>
    <div class="poster-modal" id="posterModal" hidden>
      <div class="poster-backdrop" id="posterBackdrop"></div>
      <div class="poster-panel" role="dialog" aria-modal="true" aria-labelledby="posterTitle">
        <div class="poster-head">
          <h3 id="posterTitle">项目海报</h3>
          <button id="closePosterBtn" type="button" aria-label="关闭海报">关闭</button>
        </div>
        <img id="posterImage" src="./assets/poster.png" alt="CircaGuard 项目海报" />
        <div id="posterFallback" class="poster-fallback" hidden>
          <h4 id="posterFallbackTitle">海报图片未找到</h4>
          <p id="posterFallbackBody">
            当前未检测到 <code>assets/poster.png</code>。你可以先查看文字版内容，或把海报图片放到该路径后自动显示。
          </p>
        </div>
      </div>
    </div>
    <script src="./script.js?v=20260429-videojump-1"></script>
  </body>
</html>
