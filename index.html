<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CircaGuard Web PPT</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="deck" id="deck">
      <header class="topbar">
        <div class="brand" id="brand">CircaGuard</div>
        <div class="toolbar">
          <button id="voiceBtn" type="button" title="语音讲解开关">语音：关</button>
          <button id="langBtn" type="button" title="切换中英文">EN</button>
          <button id="videoBtn" type="button">播放影片</button>
          <button id="fullscreenBtn" type="button">全屏</button>
          <button id="printBtn" type="button">导出PDF</button>
          <div class="counter" id="counter">1 / 12</div>
        </div>
      </header>

      <main class="slides" id="slides"></main>

      <footer class="controls">
        <button id="prevBtn" type="button" aria-label="上一页">← 上一页</button>
        <div class="progress-wrap"><div id="progress"></div></div>
        <button id="nextBtn" type="button" aria-label="下一页">下一页 →</button>
      </footer>
    </div>

    <div class="video-modal" id="videoModal" hidden>
      <div class="video-backdrop" id="videoBackdrop"></div>
      <div class="video-panel" role="dialog" aria-modal="true" aria-labelledby="videoTitle">
        <div class="video-head">
          <h3 id="videoTitle">项目影片</h3>
          <button id="closeVideoBtn" type="button" aria-label="关闭影片">关闭</button>
        </div>
        <video id="projectVideo" controls preload="metadata" playsinline>
          <source src="./assets/demo.mp4" type="video/mp4" />
          您的浏览器不支持视频播放，请更换浏览器重试。
        </video>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
